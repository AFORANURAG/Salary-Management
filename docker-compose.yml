services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: salary
      POSTGRES_PASSWORD: salary
      POSTGRES_DB: salary_mgmt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salary -d salary_mgmt"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: 3001
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: salary
      DB_PASSWORD: salary
      DB_NAME: salary_mgmt
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
